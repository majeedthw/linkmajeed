<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عبدالمجيد الثويني | روابط</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* الإعدادات الأساسية */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      /* خلفية متدرجة متحركة وعصرية */
      background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f3460);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* الحاوية الزجاجية (Glassmorphism) */
    .container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 20px 20px;
      width: 100%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: fadeIn 1s ease-out forwards;
      position: relative; /* مهم لزر المشاركة */
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* زر المشاركة (Share Button) */
    .share-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
    }

    .share-btn:hover {
      background: rgba(79, 172, 254, 0.3);
      transform: scale(1.1);
    }

    /* صورة الملف الشخصي */
    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid transparent;
      background: linear-gradient(#1a1a2e, #1a1a2e) padding-box, 
                  linear-gradient(45deg, #00f2fe, #4facfe) border-box;
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }

    .profile-img:hover {
      transform: scale(1.05) rotate(2deg);
    }

    /* النصوص */
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 5px;
      background: linear-gradient(45deg, #fff, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.bio {
      font-size: 14px;
      color: #b0b0c0;
      line-height: 1.8;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .bio span {
      display: inline-block;
      margin: 0 5px;
    }

    /* الروابط والأزرار */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: slideUpFade 0.6s ease forwards;
    }

    .link-btn:hover {
      background: rgba(79, 172, 254, 0.15);
      border-color: #4facfe;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
    }

    .link-btn i {
      font-size: 20px;
      position: absolute;
      right: 20px;
      color: #4facfe;
    }

    /* توقيت متسلسل للروابط */
    .link-btn:nth-child(1) { animation-delay: 0.1s; }
    .link-btn:nth-child(2) { animation-delay: 0.2s; }
    .link-btn:nth-child(3) { animation-delay: 0.3s; }
    .link-btn:nth-child(4) { animation-delay: 0.4s; }
    .link-btn:nth-child(5) { animation-delay: 0.5s; }
    .link-btn:nth-child(6) { animation-delay: 0.6s; }
    .link-btn:nth-child(7) { animation-delay: 0.7s; }
    .link-btn:nth-child(8) { animation-delay: 0.8s; }
    .link-btn:nth-child(9) { animation-delay: 0.9s; }
    .link-btn:nth-child(10) { animation-delay: 1.0s; }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* اللوجو غير القابل للحفظ */
    .un-saveable-logo {
      width: 60px; /* حجم اللوجو */
      opacity: 0.4; /* شفافية عشان يندمج كعلامة مائية */
      margin-top: 10px;
      transition: opacity 0.3s ease;
      
      /* الحيل السحرية لمنع الحفظ السهل */
      pointer-events: none; /* يمنع الضغط بالماوس نهائياً */
      user-select: none; /* يمنع التحديد */
      -webkit-user-drag: none; /* يمنع السحب والإفلات */
    }

  </style>
</head>
<body>

  <div class="container">
    
    <button class="share-btn" onclick="sharePage()" title="مشاركة الصفحة">
      <i class="fa-solid fa-share-nodes"></i>
    </button>

    <img src="profile1.jpg" alt="عبدالمجيد الثويني" class="profile-img">

    <p class="bio">

    <div class="links">
      <a href="https://www.tiktok.com/@majeedthw" target="_blank" class="link-btn">

      <a href="https://www.instagram.com/majeedthw" target="_blank" class="link-btn">

      <a href="https://www.youtube.com/@majeedthw" target="_blank" class="link-btn">
        <i class="fa-brands fa-youtube"></i> يوتيوب
      </a>
      <a href="https://www.facebook.com/share/1BDae5WGRH/?mibextid=wwXIfr" target="_blank" class="link-btn">
        <i class="fa-brands fa-facebook-f"></i> فيسبوك
      </a>
      <a href="https://x.com/majeedthw" target="_blank" class="link-btn">
        <i class="fa-brands fa-x-twitter"></i> إكس (تويتر)
      </a>
      <a href="https://snapchat.com/t/5VwWmTSe" target="_blank" class="link-btn">
        <i class="fa-brands fa-snapchat"></i> سناب شات
      </a>
      <a href="https://time.majeedthw.com" target="_blank" class="link-btn">
        <i class="fa-solid fa-clock"></i> محول الوقت
      </a>
      <a href="https://age.majeedthw.com" target="_blank" class="link-btn">
        <i class="fa-solid fa-calculator"></i> حاسبة العمر
      </a>
      <a href="https://www.linkedin.com/in/abdulmajeed-althuwaini-977b413a0" target="_blank" class="link-btn">

      <a href="mailto:a@majeedthw.com" target="_blank" class="link-btn">

    </div>

    <img src="image.png" alt="Logo" class="un-saveable-logo" oncontextmenu="return false;" draggable="false">

  </div>

  <script>
    function sharePage() {
      // إذا كان المتصفح يدعم خاصية المشاركة (مثل متصفحات الجوال)
      if (navigator.share) {
        navigator.share({
          title: 'روابط عبدالمجيد الثويني',
          text: 'شاهد جميع حساباتي وروابطي من هنا!',
          url: window.location.href,
        })
        .catch((error) => console.log('تم إلغاء المشاركة', error));
      } else {
        // إذا كان المتصفح لا يدعم (مثل بعض متصفحات الكمبيوتر)، ننسخ الرابط
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert("تم نسخ الرابط بنجاح! يمكنك الآن لصقه في أي مكان.");
        });
      }
    }
  </script>

</body>
</html>
